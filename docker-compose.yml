services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: open_signature
    environment:
      NODE_ENV: production
      DATABASE_URL: file:/app/data/custom.db
      JWT_SECRET: ${JWT_SECRET:-opesign-jwt-secret-change-in-production}
    ports:
      - "3000:3000"
    volumes:
      - app_data:/app/data
      - app_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    restart: unless-stopped

volumes:
  app_data:
  app_uploads:
