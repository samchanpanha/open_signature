services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: open-signature-local
    ports:
      - "3000:3000"
    volumes:
      - ./db:/app/db
      - ./uploads:/app/uploads
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:///app/db/custom.db
      - JWT_SECRET=opesign-jwt-secret-change-in-production
      # MinIO / S3 config (uncomment to enable)
      # - S3_ENDPOINT=http://minio:9000
      # - S3_BUCKET=opesign-docs
      # - S3_ACCESS_KEY=minioadmin
      # - S3_SECRET_KEY=minioadmin
      # - S3_REGION=us-east-1
      # - S3_PUBLIC_URL=http://localhost:9000
    depends_on:
      - minio
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: open-signature-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    restart: unless-stopped

volumes:
  minio_data:
